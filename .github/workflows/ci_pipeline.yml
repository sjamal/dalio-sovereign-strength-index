name: Continuous Integration & Verification Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate_codebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          # Bypasses the corrupted cache registry layer to clear 400 Bad Request bugs

      # Force clear local action package runner pip cache arrays
      - name: Purge Environment Cache Indices
        run: |
          python -m pip cache purge

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify Core Ingestion Pass
        run: |
          export PYTHONPATH=src
          python src/run_brain.py

      - name: Run Test Verification Suite via Pytest
        run: |
          export PYTHONPATH=src
          pytest tests/
