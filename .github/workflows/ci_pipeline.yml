name: Continuous Integration & Verification Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate_codebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # FIX: Pin Python runtime environment cleanly
      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # FIX: Execute your isolated, math-verified test suite directly.
      # This completely bypasses third-party API network drops on public data center IPs.
      - name: Run Test and Chaos Verification Suite via Pytest
        run: |
          export PYTHONPATH=src
          pytest tests/