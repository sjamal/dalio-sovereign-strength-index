name: Continuous Integration & Verification Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate_codebase:
    runs-on: ubuntu-latest
    steps:
      # FIX: Updated core actions dependencies to their modern Node.js 24 releases
      - name: Checkout Code Repository
        uses: actions/checkout@v4.1.7

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'
          cache: 'pip'

      # Explicitly declare Node runtime parameters to bypass deprecation check flags
      - name: Configure Action Environment Variables
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify Core Ingestion Pass
        run: |
          export PYTHONPATH=src
          python src/run_brain.py

      - name: Run Test Verification Suite via Pytest
        run: |
          export PYTHONPATH=src
          pytest tests/
