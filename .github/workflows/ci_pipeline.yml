name: Continuous Integration & Verification Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate_codebase:
    runs-on: ubuntu-latest
    steps:
      # FIX: Use native Linux git tools to eliminate legacy node action triggers completely
      - name: Clone Code Repository Natively
        run: |
          git clone --depth 1 https://github.com .
          git checkout ${{ github.ref_name }}

      # FIX: Enforce non-interactive frontends to eliminate exit code 100 failures
      - name: Deploy Native Python 3.11 Environment Runtime
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3.11 python3.11-venv python3-pip

      - name: Install System Dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install -r requirements.txt
          python3.11 -m pip install pytest

      - name: Verify Core Ingestion Pass
        run: |
          export PYTHONPATH=src
          python3.11 src/run_brain.py

      - name: Run Test Verification Suite via Pytest
        run: |
          export PYTHONPATH=src
          python3.11 -m pytest tests/
