name: Continuous Integration & Verification Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate_codebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # FIX: Adjusted path routing layout to match the correct target package location directory
      - name: Verify Core Ingestion Pass
        run: |
          export PYTHONPATH=src
          python src/dalio_sovereign_strength_index/run_brain.py

      - name: Run Test Verification Suite via Pytest
        run: |
          export PYTHONPATH=src
          pytest tests/
